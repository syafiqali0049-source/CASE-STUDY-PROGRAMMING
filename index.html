<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Log Makmal Geomatik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-custom { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-submit { background-color: #2c3e50; color: white; border-radius: 8px; }
        .btn-submit:hover { background-color: #1a252f; color: white; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-custom p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-uppercase">Log Makmal Geomatik</h2>
                    <p class="text-muted">Digitalisasi rekod penggunaan komputer</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nama Penuh</label>
                        <input type="text" name="nama" class="form-control" placeholder="Contoh: Muhammad Adam" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">No. ID (Matrik/Staff)</label>
                        <input type="text" name="id_pelajar" class="form-control" placeholder="A24GE0012" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">No. Komputer</label>
                            <input type="text" name="no_komputer" class="form-control" placeholder="Contoh: PC-01" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Perisian</label>
                            <select name="perisian" class="form-select">
                                <option value="ArcGIS">ArcGIS</option>
                                <option value="QGIS">QGIS</option>
                                <option value="AutoCAD">AutoCAD</option>
                                <option value="Lain-lain">Lain-lain / Browsing</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-submit w-100 py-2 mt-3">Hantar Rekod</button>
                </form>
            </div>
            <p class="text-center mt-4 text-muted" style="font-size: 0.8rem;">&copy; 2026 Fakulti Geoinformasi dan Hartanah</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
