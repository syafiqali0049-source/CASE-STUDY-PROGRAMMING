<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Log Makmal Geomatik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card-main { border-radius: 15px; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-top: 50px; }
        .header-box { background: #212529; color: white; padding: 25px; border-radius: 15px 15px 0 0; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-main">
                <div class="header-box">
                    <h3 class="m-0">LOG MAKMAL GEOMATIK</h3>
                    <small>Sistem Rekod Penggunaan Komputer Digital</small>
                </div>
                <div class="card-body p-4">

                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category }} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nama Penuh</label>
                            <input type="text" name="nama" class="form-control" placeholder="Contoh: Muhammad Adam" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">No. ID (Matrik/Staff)</label>
                            <input type="text" name="id_pelajar" class="form-control" placeholder="A24GE0012" required>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">No. Komputer</label>
                                <input type="text" name="no_komputer" class="form-control" placeholder="PC-01" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Perisian</label>
                                <select name="perisian" class="form-select">
                                    <option value="ArcGIS">ArcGIS</option>
                                    <option value="QGIS">QGIS</option>
                                    <option value="AutoCAD">AutoCAD</option>
                                    <option value="Lain-lain">Lain-lain</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 py-2 mt-3">Hantar Rekod</button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-4 text-muted small">© 2026 Fakulti Geoinformasi dan Hartanah</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
